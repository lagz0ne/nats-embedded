name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: win32-x64
          - os: windows-latest
            platform: win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run download ${{ matrix.platform }}
      - name: Verify binary
        run: ls -la packages/${{ matrix.platform }}/nats-server*
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: packages/${{ matrix.platform }}/nats-server*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Place binaries
        run: |
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp artifacts/${platform}/nats-server packages/${platform}/nats-server
            chmod +x packages/${platform}/nats-server
          done
          for platform in win32-x64 win32-arm64; do
            cp artifacts/${platform}/nats-server.exe packages/${platform}/nats-server.exe
          done
      - name: Copy LICENSE into publishable packages
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64 nats-embedded; do
            cp LICENSE packages/${pkg}/LICENSE
          done
      - run: bun install
      - run: bun run build
      - name: Dry run publish
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64 nats-embedded; do
            cd packages/${pkg}
            npm publish --access public --dry-run
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish packages
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64 nats-embedded; do
            cd packages/${pkg}
            npm publish --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
